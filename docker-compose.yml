services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opsguard-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsguard_ai}
      POSTGRES_USER: ${POSTGRES_USER:-opsguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - opsguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-opsguard} -d ${POSTGRES_DB:-opsguard_ai}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  opsguard_postgres_data:
